<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1r00t - Party Boss Timer (Sound Mode)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); border: 1px solid #333; }
        h2 { text-align: center; color: #00ff88; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #aaa; margin-bottom: 25px; font-size: 0.9rem; }
        .server-status { text-align: center; color: #00ff88; font-size: 0.8rem; margin-top: -20px; margin-bottom: 20px; }
        
        .input-group { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; background: #2a2a2a; padding: 20px; border-radius: 10px; border-left: 5px solid #00ff88; }
        select, input { padding: 12px; background: #181818; border: 1px solid #444; color: white; border-radius: 6px; font-size: 15px; }
        select { width: 110px; border-color: #00ff88; font-weight: bold; }
        input[type="text"] { flex: 2; min-width: 200px; }
        input[type="number"] { width: 150px; text-align: center; border-color: #ffaa00; }
        select:focus, input:focus { outline: none; border-color: #00ff88; box-shadow: 0 0 5px rgba(0, 255, 136, 0.5); }
        
        .btn-add { background-color: #00ff88; color: #000; padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; white-space: nowrap; flex: 1; }
        .btn-add:hover { background-color: #00cc6a; transform: translateY(-2px); }
        .label-text { color: #00ff88; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }

        #bossList { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }

        .boss-card { background: #262626; padding: 18px; border-left: 6px solid #00ff88; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; transition: 0.3s; }
        .boss-info { display: flex; align-items: center; gap: 20px; }
        .ch-badge { background: #00ff88; color: #000; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 1.2rem; min-width: 60px; text-align: center; box-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        .boss-name { font-size: 1.25rem; font-weight: bold; color: #fff; }
        .spawn-time-txt { color: #bbb; font-size: 0.95rem; margin-top: 5px; }
        .spawn-highlight { color: #ffaa00; font-weight: bold; border-bottom: 1px dashed #ffaa00; }
        
        .right-section { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: flex-end; flex: 1; }
        .timer { font-size: 2rem; color: #ff4757; font-weight: bold; font-family: 'Courier New', Courier, monospace; min-width: 160px; text-align: right; text-shadow: 0 0 5px rgba(255, 71, 87, 0.3); }
        .warning { color: #ffaa00; animation: blink 0.8s linear infinite; } 
        .ready { color: #00ff88; animation: blink 0.5s linear infinite; } 
        
        .btn-reset { background: #ffaa00; color: #000; padding: 10px 18px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #cc8800; }
        .btn-reset:hover { background: #e69900; transform: translateY(2px); box-shadow: 0 2px 0 #cc8800; }
        
        .btn-delete { background: #444; color: #ccc; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-delete:hover { background: #ff4757; color: white; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <h2>⚔️ Indignabt Nebulas Timer ⚔️</h2>
    <div class="sub-title">ด่าน 103 | เสียงเตือนอัตโนมัติ 🔊</div>
    <div class="server-status">🟢 Online & Synced via Firebase</div>
    
    <div class="input-group">
        <div style="display:flex; flex-direction:column; gap:5px;">
            <span class="label-text">Channel</span>
            <select id="bossChannel">
                <option value="CH 1">CH 1</option><option value="CH 2">CH 2</option>
                <option value="CH 3">CH 3</option><option value="CH 4">CH 4</option>
                <option value="CH 5">CH 5</option><option value="CH 6">CH 6</option>
                <option value="CH 7">CH 7</option><option value="CH 8">CH 8</option>
                <option value="CH 9">CH 9</option><option value="CH 10">CH 10</option>
            </select>
        </div>
        
        <div style="display:flex; flex-direction:column; gap:5px; flex:2;">
            <span class="label-text">ชื่อบอส</span>
            <input type="text" id="bossName" value="Indignabt Nebulas (ด่าน 103)">
        </div>
        
        <div style="display:flex; flex-direction:column; gap:5px;">
            <span class="label-text">อีกกี่นาทีเกิด?</span>
            <input type="number" id="minUntilSpawn" placeholder="นาที" min="0">
        </div>
        
        <button class="btn-add" onclick="window.addBoss()">➕ เพิ่มเข้ารายการ</button>
    </div>

    <div id="bossList"></div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = freq;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCypbGzxD2cr9xt1LaPDpClQ_8ta8ElKqs",
      authDomain: "dekd-bosstimer.firebaseapp.com",
      databaseURL: "https://dekd-bosstimer-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dekd-bosstimer",
      storageBucket: "dekd-bosstimer.firebasestorage.app",
      messagingSenderId: "274832281613",
      appId: "1:274832281613:web:ef1bac4b4562f4719ac544",
      measurementId: "G-F4FRHKXFCD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const bossesRef = ref(db, 'bosses');

    const COOLDOWN_MINUTES = 240; 
    let activeTimers = {}; 

    onValue(bossesRef, (snapshot) => {
        const list = document.getElementById('bossList');
        list.innerHTML = ''; 
        Object.values(activeTimers).forEach(clearInterval);
        activeTimers = {};

        const data = snapshot.val();
        if (data) {
            const bosses = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            bosses.forEach(boss => createBossCard(boss.id, boss.channel, boss.name, boss.targetTime));
        } else {
            list.innerHTML = '<div style="text-align:center; color:#888;">ยังไม่มีรายการบอส...</div>';
        }
    });

    window.addBoss = function() {
        const chInput = document.getElementById('bossChannel').value;
        const nameInput = document.getElementById('bossName').value.trim();
        const minUntilSpawn = parseInt(document.getElementById('minUntilSpawn').value);
        if (!nameInput || isNaN(minUntilSpawn)) { alert('ระบุเวลาด้วยครับ'); return; }
        const targetTimeValue = new Date().getTime() + (minUntilSpawn * 60000);
        push(bossesRef, { channel: chInput, name: nameInput, targetTime: targetTimeValue });
        document.getElementById('minUntilSpawn').value = '';
    };

    window.resetBoss = function(id) {
        const newTargetTime = new Date().getTime() + (COOLDOWN_MINUTES * 60000);
        update(ref(db, 'bosses/' + id), { targetTime: newTargetTime });
    };

    window.deleteBoss = function(id) {
        if(confirm("ลบไหม?")) remove(ref(db, 'bosses/' + id));
    };

    function createBossCard(id, channel, name, targetTimeValue) {
        const list = document.getElementById('bossList');
        const card = document.createElement('div');
        card.className = 'boss-card';
        const chNumber = parseInt(channel.replace(/\D/g, '')) || 99;
        let targetDate = new Date(targetTimeValue);
        let notified3Min = false; 
        let alertedSpawn = false; 

        card.innerHTML = `
            <div class="boss-info">
                <div class="ch-badge">${channel}</div>
                <div>
                    <div class="boss-name">${name}</div>
                    <div class="spawn-time-txt">รอบถัดไป: <span class="spawn-highlight">${String(targetDate.getHours()).padStart(2,'0')}:${String(targetDate.getMinutes()).padStart(2,'0')} น.</span></div>
                </div>
            </div>
            <div class="right-section">
                <div class="timer" id="timer-${id}">--:--:--</div>
                <button class="btn-reset" onclick="window.resetBoss('${id}')">⚔️ ตีตายแล้ว!</button>
                <button class="btn-delete" onclick="window.deleteBoss('${id}')">X</button>
            </div>
        `;
        list.appendChild(card); 

        function updateTimerDisplay() {
            const now = new Date().getTime();
            const distance = targetDate.getTime() - now;
            const timerEl = document.getElementById(`timer-${id}`);

            if (distance <= 0) {
                timerEl.innerText = 'READY!';
                timerEl.className = 'timer ready';
                card.style.order = -1;
                if (!alertedSpawn) {
                    playBeep(880, 0.5); // เสียงสูงยาวๆ ตอนบอสเกิด
                    setTimeout(() => playBeep(880, 0.5), 600);
                    alertedSpawn = true;
                }
            } else {
                card.style.order = chNumber;
                if (distance <= 180000) {
                    timerEl.className = 'timer warning';
                    if (!notified3Min) {
                        playBeep(440, 0.2); // เสียงบี๊บเตือนล่วงหน้า 3 นาที
                        notified3Min = true;
                    }
                } else {
                    timerEl.className = 'timer';
                }
                const h = Math.floor((distance % 86400000) / 3600000);
                const m = Math.floor((distance % 3600000) / 60000);
                const s = Math.floor((distance % 60000) / 1000);
                timerEl.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
        }
        updateTimerDisplay();
        activeTimers[id] = setInterval(updateTimerDisplay, 1000);
    }
</script>
</body>
</html>
