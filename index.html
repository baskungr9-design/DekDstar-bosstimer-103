<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Star Guild - Boss Timer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: #ffffff; padding: 20px; overflow-x: hidden; }
        .container { max-width: 850px; margin: 0 auto; background: #1a1a1a; padding: 25px; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 255, 136, 0.15); border: 1px solid #333; position: relative; }
        
        .header-container { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; min-height: 100px; }
        .guild-logo { 
            position: absolute; 
            left: 0; 
            width: 140px; 
            max-height: 140px; 
            object-fit: contain; 
            filter: drop-shadow(0 0 15px rgba(0, 191, 255, 0.6));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .guild-logo:hover { transform: scale(1.1) rotate(-3deg); }
        .header-text { text-align: center; z-index: 2; }
        
        h2 { color: #00ff88; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; margin-top: 0; text-shadow: 0 0 10px rgba(0,255,136,0.5); font-size: 1.8rem; }
        .sub-title { color: #aaa; margin-bottom: 5px; font-size: 0.9rem; letter-spacing: 1px; }
        .server-status { color: #00ff88; font-size: 0.8rem; font-family: monospace; }
        
        .input-group { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; align-items: flex-end; background: #222; padding: 20px; border-radius: 8px; border-left: 4px solid #00ff88; position: relative; z-index: 2; }
        .input-wrapper { display:flex; flex-direction:column; gap:5px; flex:1; min-width: 150px; }
        select, input { padding: 12px; background: #111; border: 1px solid #444; color: white; border-radius: 4px; font-size: 15px; transition: 0.3s; }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: #00ff88; box-shadow: 0 0 8px rgba(0, 255, 136, 0.4); }
        input[type="number"] { text-align: center; border-color: #ffaa00; }
        
        .btn-add { background: linear-gradient(45deg, #00ff88, #00cc6a); color: #000; padding: 12px 25px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px; height: 45px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,255,136,0.3); white-space: nowrap;}
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,136,0.5); filter: brightness(1.1); }
        .label-text { color: #888; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        #bossList { display: flex; flex-direction: column; gap: 15px; }

        .boss-card { background: #222; padding: 20px; border-left: 5px solid #00ff88; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; transition: all 0.3s ease; position: relative; z-index: 1; }
        .boss-info { display: flex; align-items: center; gap: 20px; }
        .ch-badge { background: #00ff88; color: #000; padding: 8px 18px; border-radius: 4px; font-weight: 900; font-size: 1.3rem; min-width: 60px; text-align: center; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); letter-spacing: 1px; }
        
        .boss-name { 
            font-size: 1.4rem; font-weight: 900; text-transform: uppercase;
            background: linear-gradient(90deg, #00ff88, #00bfff, #ffaa00, #ff4757, #00ff88);
            background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite; letter-spacing: 1px;
        }
        @keyframes gradient-shift { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .spawn-time-txt { color: #888; font-size: 0.95rem; margin-top: 5px; font-family: monospace; }
        .spawn-highlight { color: #ffaa00; font-weight: bold; font-size: 1.1rem; }
        
        .right-section { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: flex-end; flex: 1; }
        .timer { font-size: 2.5rem; color: #ff4757; font-weight: 900; font-family: 'Courier New', Courier, monospace; min-width: 170px; text-align: right; text-shadow: 0 0 10px rgba(255, 71, 87, 0.4); }
        .warning { color: #ffaa00; animation: pulse-text 1s linear infinite; } 
        @keyframes pulse-text { 50% { opacity: 0.5; } }

        .card-spawned {
            background: linear-gradient(45deg, #3a0000, #1a0000); border: 2px solid #ff0000;
            z-index: 100; transform: scale(1.02); box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
            animation: epic-quake 0.4s infinite, hellfire-pulse 1.5s infinite alternate;
        }
        @keyframes epic-quake {
            0%, 100% { transform: translate(1px, 1px) scale(1.02); }
            50% { transform: translate(-1px, -1px) scale(1.02); }
        }
        @keyframes hellfire-pulse { from { border-color: #ff0000; } to { border-color: #ffaa00; } }

        .ready-epic { font-size: 3.2rem !important; color: #ffffff; text-shadow: 0 0 20px #ffea00, 0 0 40px #ff2a00, 0 0 80px #ff0000; }
        
        .btn-reset { background: transparent; color: #ffaa00; padding: 10px 18px; border: 2px solid #ffaa00; border-radius: 4px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-reset:hover { background: #ffaa00; color: #000; }
        .btn-delete { background: transparent; color: #555; padding: 10px 15px; border: 2px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete:hover { background: #ff4757; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="logo.png" alt="V-Star Logo" class="guild-logo" onerror="this.style.display='none'">
        <div class="header-text">
            <h2>⚔️ V-STAR BOSS TIMER ⚔️</h2>
            <div class="sub-title">ระบบแจ้งเตือนบอส | EPIC SPAWN EFFECTS 🔥</div>
            <div class="server-status">/// SYNCED VIA FIREBASE & DISCORD ///</div>
        </div>
    </div>
    
    <div class="input-group">
        <div class="input-wrapper" style="flex:0; min-width:130px;">
            <span class="label-text">Channel / Map</span>
            <input type="text" id="bossChannel" list="chOptions" placeholder="CH หรือ แมพ">
            <datalist id="chOptions">
                <option value="CH 1"></option><option value="CH 2"></option>
                <option value="CH 3"></option><option value="CH 4"></option>
                <option value="CH 5"></option><option value="CH 6"></option>
                <option value="CH 7"></option><option value="CH 8"></option>
                <option value="CH 9"></option><option value="CH 10"></option>
            </datalist>
        </div>
        <div class="input-wrapper" style="flex:2;">
            <span class="label-text">ชื่อบอส / ด่าน</span>
            <input type="text" id="bossName" list="bossOptions" placeholder="พิมพ์ชื่อบอส หรือ แมพที่ต้องการ">
            <datalist id="bossOptions">
                <option value="Indignabt Nebulas (ด่าน 103)"></option>
            </datalist>
        </div>
        <div class="input-wrapper" style="flex:1;">
            <span class="label-text">อีกกี่นาทีเกิด?</span>
            <input type="number" id="minUntilSpawn" placeholder="นาที" min="0">
        </div>
        <button class="btn-add" onclick="window.addBoss()">➕ เพิ่มเข้ารายการ</button>
    </div>
    <div id="bossList"></div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = freq; oscillator.type = 'square';
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
    }
</script>

<script type="module">
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1489300472836919457/FDNB9wVa2eFCj-LtXxkghAyC2F_MjdGcdaxF0I-Y-IXBFvzYSoa69INQcUUPDL4O2tcf"; 

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCypbGzxD2cr9xt1LaPDpClQ_8ta8ElKqs",
      authDomain: "dekd-bosstimer.firebaseapp.com",
      databaseURL: "https://dekd-bosstimer-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dekd-bosstimer",
      storageBucket: "dekd-bosstimer.firebasestorage.app",
      messagingSenderId: "274832281613",
      appId: "1:274832281613:web:ef1bac4b4562f4719ac544",
      measurementId: "G-F4FRHKXFCD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const bossesRef = ref(db, 'bosses');

    function sendDiscordAlert(channel, bossName, minutes) {
        const payload = {
            content: "@here 📢 เตรียมตัวลุยบอส!!",
            embeds: [{
                title: "🚨 แจ้งเตือนบอสเกิด!",
                description: `**${bossName}** ที่ **${channel}**\nกำลังจะเกิดในอีก **${minutes}** นาที!\nเตรียมตัวลุยเลย! ⚔️`,
                color: 65416
            }]
        };
        fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    }

    onValue(bossesRef, (snapshot) => {
        const list = document.getElementById('bossList');
        list.innerHTML = '';
        const data = snapshot.val();
        if (data) {
            Object.entries(data).forEach(([id, boss]) => createBossCard(id, boss.channel, boss.name, boss.targetTime));
        }
    });

    window.addBoss = function() {
        const ch = document.getElementById('bossChannel').value.trim();
        const name = document.getElementById('bossName').value.trim();
        const mins = parseInt(document.getElementById('minUntilSpawn').value);
        if (!name || isNaN(mins)) return;
        const target = new Date().getTime() + (mins * 60000);
        push(bossesRef, { channel: ch || "N/A", name: name, targetTime: target });
        sendDiscordAlert(ch || "N/A", name, mins);
        document.getElementById('minUntilSpawn').value = '';
    };

    window.resetBoss = (id) => update(ref(db, 'bosses/' + id), { targetTime: new Date().getTime() + (240 * 60000) });
    window.deleteBoss = (id) => remove(ref(db, 'bosses/' + id));

    function createBossCard(id, channel, name, targetTimeValue) {
        const list = document.getElementById('bossList');
        const card = document.createElement('div');
        card.className = 'boss-card'; card.id = `card-${id}`;
        const targetDate = new Date(targetTimeValue);
        card.innerHTML = `
            <div class="boss-info">
                <div class="ch-badge">${channel}</div>
                <div><div class="boss-name">${name}</div><div class="spawn-time-txt">Spawn Time: <span class="spawn-highlight">${String(targetDate.getHours()).padStart(2,'0')}:${String(targetDate.getMinutes()).padStart(2,'0')} น.</span></div></div>
            </div>
            <div class="right-section">
                <div class="timer" id="timer-${id}">--:--:--</div>
                <button class="btn-reset" onclick="window.resetBoss('${id}')">RESET (4H)</button>
                <button class="btn-delete" onclick="window.deleteBoss('${id}')">X</button>
            </div>
        `;
        list.appendChild(card);
        setInterval(() => {
            const distance = targetTimeValue - new Date().getTime();
            const timerEl = document.getElementById(`timer-${id}`);
            if (!timerEl) return;
            if (distance <= 0) {
                timerEl.innerText = 'READY!'; timerEl.className = 'timer ready-epic';
                card.classList.add('card-spawned'); card.style.order = -1;
            } else {
                const h = Math.floor((distance % 86400000) / 3600000);
                const m = Math.floor((distance % 3600000) / 60000);
                const s = Math.floor((distance % 60000) / 1000);
                timerEl.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if (distance <= 180000) timerEl.className = 'timer warning';
            }
        }, 1000);
    }
</script>
</body>
</html>
